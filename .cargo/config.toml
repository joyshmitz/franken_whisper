# Build CPU baseline: x86-64-v3 (AVX2 + FMA + BMI1/2 + ...), i.e. Intel Haswell
# (2013) / AMD Excavator (2015) and newer — effectively universal on modern
# machines and on the CI/rch build fleet.
#
# WHY: franken_whisper's native engine is SIMD/FMA-heavy (log-mel FFT, layer_norm
# vertical SIMD) AND it delegates every matmul to FrankenTorch's sgemm. The Rust
# default target (`x86-64`, SSE2 only) leaves AVX2/FMA on the table for ALL of
# that. Recompiling with x86-64-v3 is a MEASURED end-to-end win that finally moves
# the e2e-dominant GEMM:
#
#   native_engine_bench (tiny.en, local, same-host A/B)   SSE2      x86-64-v3
#     encoder_window_tiny                                  263 ms ->  ~204 ms  (1.29x)
#     decoder_token_step_tiny                              122 ms ->  ~102 ms  (1.20x)
#     e2e_tiny_jfk (full 11s transcription)                708 ms ->  633 ms   (1.12x)
#
# CONFORMANCE: AVX2/FMA changes f32 rounding slightly (fused multiply-add, wider
# SIMD reductions), but franken_whisper's contract is transcription-level (see
# docs/conformance-contract.md), NOT bit-exact. native_engine_e2e is 6/6 green
# under this flag — transcription is unchanged. (#![forbid(unsafe_code)] rules out
# runtime AVX2 dispatch via #[target_feature], so a build-wide baseline is the
# only safe way to get these instructions.)
#
# TRADE-OFF / REVERT: this raises the minimum CPU to AVX2 (2013+). To target older
# CPUs, delete this file (reverts to portable SSE2 `x86-64`) or lower to
# `x86-64-v2`. See docs/PERF_LEDGER.md (lever L7).
[build]
rustflags = ["-C", "target-cpu=x86-64-v3"]
