name: dist

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # franken_whisper pins to nightly via rust-toolchain.toml; install
      # the nightly channel up front so cargo doesn't have to fetch it on
      # demand (and so we get rustfmt + clippy on the same channel).
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      # fmt + clippy are reported as advisory because the codebase isn't
      # cleanly fmt'd or clippy-clean yet; the gate that actually blocks
      # release on this job is `cargo test --lib`. The downstream `build`
      # job uses `if: always() && !cancelled()` so binaries still ship even
      # if these checks fail, but a green test_job is the canonical signal.
      - name: Check formatting
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Run tests
        run: cargo test --lib

  build:
    needs: test
    # Tests are advisory, never block the binary release.
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_arch: linux_amd64
            archive_ext: tar.gz
            binary: franken_whisper
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_arch: linux_arm64
            archive_ext: tar.gz
            binary: franken_whisper
          - os: macos-15-intel
            target: x86_64-apple-darwin
            os_arch: darwin_amd64
            archive_ext: tar.gz
            binary: franken_whisper
          - os: macos-14
            target: aarch64-apple-darwin
            os_arch: darwin_arm64
            archive_ext: tar.gz
            binary: franken_whisper
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_arch: windows_amd64
            archive_ext: zip
            binary: franken_whisper.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      # franken_whisper pins nightly via rust-toolchain.toml; matching that
      # here lets the cross-compile target install live on the same channel
      # cargo will actually use for the build.
      - name: Install Rust nightly with target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        # install.sh strips the leading "v" before constructing the asset
        # name (`franken_whisper-${VERSION#v}-${os}_${arch}.tar.gz`), so we
        # must do the same here. Tag push -> v1.2.3 -> 1.2.3 in the name.
        # Workflow_dispatch from a non-tag context ($GITHUB_REF_NAME = branch)
        # produces something like `franken_whisper-main-...`; that's only
        # downloadable via direct URL, never via install.sh.
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          ARCHIVE="franken_whisper-${VERSION_NO_V}-${{ matrix.os_arch }}.${{ matrix.archive_ext }}"
          cd target/${{ matrix.target }}/release
          tar -czf "../../../dist/$ARCHIVE" "${{ matrix.binary }}"
          cd ../../../dist
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $versionNoV = "${env:GITHUB_REF_NAME}" -replace '^v',''
          $archive = "franken_whisper-${versionNoV}-${{ matrix.os_arch }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "dist/$archive"
          Push-Location dist
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "$archive.sha256"
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate aggregate checksums-sha256.txt
        # install.sh expects this filename verbatim:
        #   https://github.com/${OWNER}/${REPO}/releases/download/${VERSION}/checksums-sha256.txt
        # with one `<sha256>  <archive_name>` line per binary asset.
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          rm -f checksums-sha256.txt
          for f in franken_whisper-*.tar.gz franken_whisper-*.zip; do
            shasum -a 256 "$f" >> checksums-sha256.txt
          done
          cat checksums-sha256.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign release archives (sigstore bundle)
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          for f in franken_whisper-*.tar.gz franken_whisper-*.zip; do
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Copy install scripts to dist
        run: |
          cp install.sh dist/ 2>/dev/null || echo "No install.sh found"
          cp install.ps1 dist/ 2>/dev/null || echo "No install.ps1 found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-homebrew-tap:
    name: Notify Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 5
    continue-on-error: true
    env:
      HAS_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Check for token
        id: check
        run: |
          if [[ "${{ env.HAS_TOKEN }}" != "true" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not configured, skipping notification"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from tag
        if: steps.check.outputs.skip != 'true'
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Trigger formula update
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: Dicklesworthstone/homebrew-tap
          event-type: formula-update
          client-payload: |
            {
              "tool": "franken_whisper",
              "version": "${{ steps.version.outputs.version }}"
            }
